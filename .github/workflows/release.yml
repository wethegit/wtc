name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  version-pr:
    name: Create version PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Open or update Changesets version PR
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-release:
    name: Detect version change
    needs: version-pr
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - id: version
        name: Compare package versions
        run: |
          git show "${{ github.event.before }}:package.json" > /tmp/package-before.json 2>/dev/null || true

          VERSION=$(bun -e 'const pkg = await Bun.file("package.json").json(); console.log(pkg.version)')
          PREVIOUS_VERSION=""

          if [ -s /tmp/package-before.json ]; then
            PREVIOUS_VERSION=$(bun -e 'const pkg = await Bun.file("/tmp/package-before.json").json(); console.log(pkg.version)')
          fi

          if [ "$PREVIOUS_VERSION" = "$VERSION" ]; then
            echo "package.json version stayed at $VERSION. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Detected package version change: ${PREVIOUS_VERSION:-none} -> $VERSION"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact }}
    needs: detect-release
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: wtc-darwin-arm64
            runner: macos-latest
            platform: darwin
            arch: arm64
          - artifact: wtc-darwin-x64
            runner: macos-latest
            platform: darwin
            arch: x64
          - artifact: wtc-linux-x64
            runner: ubuntu-latest
            platform: linux
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Install cross-platform native packages
        run: bun install --os="*" --cpu="*" @opentui/core

      - name: Build binary
        run: bun run build
        env:
          WTC_TARGET_PLATFORM: ${{ matrix.platform }}
          WTC_TARGET_ARCH: ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Publish release
    needs: [detect-release, build]
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release tag
        env:
          TAG: ${{ needs.detect-release.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-release.outputs.tag }}
          name: ${{ needs.detect-release.outputs.tag }}
          files: dist/wtc-*
          fail_on_unmatched_files: true
