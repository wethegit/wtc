name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Install cross-platform native packages
        run: bun install --os="*" --cpu="*" @opentui/core

      - name: Build binary
        run: bun run build
        env:
          WTC_TARGET_PLATFORM: darwin
          WTC_TARGET_ARCH: arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtc-darwin-arm64
          path: dist/wtc-darwin-arm64

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wtc-*
          fail_on_unmatched_files: true

  build-macos-x64:
    name: Build macOS x64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Install cross-platform native packages
        run: bun install --os="*" --cpu="*" @opentui/core

      - name: Build binary
        run: bun run build
        env:
          WTC_TARGET_PLATFORM: darwin
          WTC_TARGET_ARCH: x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtc-darwin-x64
          path: dist/wtc-darwin-x64

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wtc-*
          fail_on_unmatched_files: true

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Install cross-platform native packages
        run: bun install --os="*" --cpu="*" @opentui/core

      - name: Build binary
        run: bun run build
        env:
          WTC_TARGET_PLATFORM: linux
          WTC_TARGET_ARCH: x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtc-linux-x64
          path: dist/wtc-linux-x64

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wtc-*
          fail_on_unmatched_files: true

  update-packages:
    name: Update package checksums
    needs: [build-macos-arm64, build-macos-x64, build-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update package files with checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM64=$(sha256sum dist/wtc-darwin-arm64 | cut -d' ' -f1)
          SHA_X64=$(sha256sum dist/wtc-darwin-x64 | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum dist/wtc-linux-x64 | cut -d' ' -f1)

          ruby -e '
            path = "Formula/wtc.rb"
            version, arm64, x64, linux = ARGV
            content = File.read(path)
            content = content.gsub(/version "[^"]+"/, "version \"#{version}\"")
            content = content.gsub(/(wtc-darwin-arm64"\n\s*)sha256 (?:"[^"]+"|:no_check)/, "\\1sha256 \"#{arm64}\"")
            content = content.gsub(/(wtc-darwin-x64"\n\s*)sha256 (?:"[^"]+"|:no_check)/, "\\1sha256 \"#{x64}\"")
            content = content.gsub(/(wtc-linux-x64"\n\s*)sha256 (?:"[^"]+"|:no_check)/, "\\1sha256 \"#{linux}\"")
            File.write(path, content)
          ' "$VERSION" "$SHA_ARM64" "$SHA_X64" "$SHA_LINUX"

          ruby -e '
            path = "aur/PKGBUILD"
            version, linux = ARGV
            content = File.read(path)
            content = content.gsub(/^pkgver=.*/, "pkgver=#{version}")
            content = content.gsub(/^sha256sums=\(.*/, "sha256sums=(\"#{linux}\")")
            File.write(path, content)
          ' "$VERSION" "$SHA_LINUX"

      - name: Commit package updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/wtc.rb aur/PKGBUILD
          if ! git diff --cached --quiet; then
            git commit -m "chore: update package checksums to ${GITHUB_REF_NAME}"
            git push
          fi
