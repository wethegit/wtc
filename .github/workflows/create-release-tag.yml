name: Create Release Tag

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write

jobs:
  tag:
    name: Tag package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create tag for package version
        run: |
          git show "${{ github.event.before }}:package.json" > /tmp/package-before.json 2>/dev/null || true

          VERSION=$(bun -e 'const pkg = await Bun.file("package.json").json(); console.log(pkg.version)')
          PREVIOUS_VERSION=""

          if [ -s /tmp/package-before.json ]; then
            PREVIOUS_VERSION=$(bun -e 'const pkg = await Bun.file("/tmp/package-before.json").json(); console.log(pkg.version)')
          fi

          if [ "$PREVIOUS_VERSION" = "$VERSION" ]; then
            echo "package.json changed, but version stayed at $VERSION. Skipping tag."
            exit 0
          fi

          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG" -m "Release $TAG"
          git push origin "$TAG"
